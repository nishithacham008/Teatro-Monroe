<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment | Teatro Monroe</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Cormorant+Garamond&display=swap" rel="stylesheet">
<link rel="stylesheet" href="payment.css">
</head>

<body>

<div class="payment-container">

  <h1>Payment</h1>

  <div class="details">
    <p>Seats: <span id="seat-count"></span></p>
    <p>Total: ₹<span id="total-price"></span></p>
  </div>

  <form onsubmit="pay(event)">
    <input id="card-number" type="text" placeholder="Card Number">
<input id="card-name" type="text" placeholder="Card Holder Name">

<div class="row">
  <input id="expiry" type="text" placeholder="MM/YY">
  <input id="cvv" type="password" placeholder="CVV">
</div>

    <button type="submit">PAY NOW</button>
  </form>

</div>

<script>
document.getElementById("seat-count").innerText = localStorage.getItem("seatCount");
document.getElementById("total-price").innerText = localStorage.getItem("totalPrice");

function pay(e) {
  e.preventDefault();

  const cardNumber = document.getElementById("card-number").value.trim();
  const cardName = document.getElementById("card-name").value.trim();
  const expiry = document.getElementById("expiry").value.trim();
  const cvv = document.getElementById("cvv").value.trim();

  document.getElementById("card-number").addEventListener("input", function(e) {
  this.value = this.value.replace(/\D/g, '').slice(0,16);
});
  if (!/^\d{16}$/.test(cardNumber)) {
    alert("Invalid card number (must be 16 digits)");
    return;
  }

  if (!/^[a-zA-Z ]+$/.test(cardName)) {
    alert("Invalid name (letters only)");
    return;
  }

  document.getElementById("expiry").addEventListener("input", function(e) {
  let value = this.value.replace(/\D/g, '').slice(0,4);

  if (value.length >= 3) {
    value = value.slice(0,2) + '/' + value.slice(2);
  }

  this.value = value;
});
  if (!/^(0[1-9]|1[0-2])\/\d{2}$/.test(expiry)) {
    alert("Invalid expiry format (MM/YY)");
    return;
  }

  if (!/^\d{3}$/.test(cvv)) {
    alert("Invalid CVV (3 digits)");
    return;
  }

  alert("Processing Payment...");

  setTimeout(() => {
    window.location.href = "success.html";
  }, 1500);
}
</script>

</body>
</html>
