<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | Teatro Monroe</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Cormorant+Garamond&display=swap" rel="stylesheet">
<link rel="stylesheet" href="login.css">
</head>

<body>

<div class="login-container">

  <h1>Teatro Monroe</h1>
  <p class="tagline">Continue your cinematic journey</p>

  <div class="toggle">
    <span id="login-tab" class="active" onclick="showLogin()">Login</span>
    <span id="signup-tab" onclick="showSignup()">Sign Up</span>
  </div>

  <form id="login-form" onsubmit="login(event)">
  <input type="text" id="login-username" placeholder="Username" required>
  <input type="password" id="login-password" placeholder="Password" required>
  <button type="submit">LOGIN</button>
</form>

<form id="signup-form" onsubmit="signup(event)" style="display:none;">
  <input type="text" id="signup-username" placeholder="Username" required>
  <input type="password" id="signup-password" placeholder="Password" required>
  <button type="submit">SIGN UP</button>
</form>

<p id="message"></p>

</div>

<script>
function getUsers() {
  return JSON.parse(localStorage.getItem("users")) || [];
}

function showLogin() {
  document.getElementById("login-form").style.display = "block";
  document.getElementById("signup-form").style.display = "none";

  document.getElementById("login-tab").classList.add("active");
  document.getElementById("signup-tab").classList.remove("active");

  clearMessage();
}

function showSignup() {
  document.getElementById("login-form").style.display = "none";
  document.getElementById("signup-form").style.display = "block";

  document.getElementById("signup-tab").classList.add("active");
  document.getElementById("login-tab").classList.remove("active");
}

function login(e) {
  e.preventDefault();

  const username = document.getElementById("login-username").value.trim();
  const password = document.getElementById("login-password").value.trim();

  if (username.length < 3) {
    showMessage("Username must be at least 3 characters", true);
    return;
  }

  if (password.length < 6) {
    showMessage("Password must be at least 6 characters", true);
    return;
  }

  const users = getUsers();
  const user = users.find(u => u.username === username);

  if (!user) {
    showMessage("No account found. Please sign up.", true);
    showSignup();
    document.getElementById("signup-username").value = username;
    return;
  }

  if (user.password !== password) {
    showMessage("Incorrect password", true);
    return;
  }

  localStorage.setItem("loggedIn", "true");
  localStorage.setItem("username", username);

  redirectUser();
}

function signup(e) {
  e.preventDefault();

  const username = document.getElementById("signup-username").value.trim();
  const password = document.getElementById("signup-password").value.trim();

  if (username.length < 3) {
    showMessage("Username must be at least 3 characters", true);
    return;
  }

  if (password.length < 6) {
    showMessage("Password must be at least 6 characters", true);
    return;
  }

  let users = getUsers();

  const exists = users.some(u => u.username === username);

  if (exists) {
    showMessage("Username already exists. Please login.", true);
    return;
  }

  users.push({ username, password });
  localStorage.setItem("users", JSON.stringify(users));

  showMessage("✔ Account created successfully!", false);
  showLogin();
}

function redirectUser() {
  const redirectPage = localStorage.getItem("redirectAfterLogin");

  if (redirectPage) {
    localStorage.removeItem("redirectAfterLogin");
    window.location.href = redirectPage;
  } else {
    window.location.href = "index.html";
  }
}

function showMessage(msg, isError) {
  const message = document.getElementById("message");
  message.innerText = msg;
  message.style.color = isError ? "#ff4d4d" : "#90ee90";
}

function clearMessage() {
  document.getElementById("message").innerText = "";
}
</script>

</body>
</html>
