<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book Seats | Teatro Monroe</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Cormorant+Garamond&display=swap" rel="stylesheet">
<link rel="stylesheet" href="bookings.css">

</head>
<body>

<div class="screen-hero">
  <h1 id="screen-title"></h1>
  <div class="screen-line"></div>
</div>

<!-- BLUR OVERLAY -->
<div class="overlay" id="overlay"></div>

<!-- GLASS PANEL -->
<div class="glass-panel" id="seat-panel">
  <h2>Select Number of Seats</h2>

  <div class="seat-options" id="seat-options">
    <span class="seat-option" onclick="selectSeatCount(1)">1</span>
    <span class="seat-option" onclick="selectSeatCount(2)">2</span>
    <span class="seat-option" onclick="selectSeatCount(3)">3</span>
    <span class="seat-option" onclick="selectSeatCount(4)">4</span>
    <span class="seat-option" onclick="selectSeatCount(5)">5</span>
  </div>

  <button onclick="startBooking()" id="continue-btn">Select Seats</button>
</div>

<!-- THEATRE LAYOUT -->
<div class="layout" id="layout">

  <h2>PLATINUM</h2>
  <div class="seats platinum" id="platinum"></div>

  <h2>DIAMOND</h2>
  <div class="seats diamond" id="diamond"></div>

  <h2>GOLD</h2>
  <div class="seats gold" id="gold"></div>

</div>

<div class="summary" id="summary">
  <h3>Booking Summary</h3>

  <p>Seats Selected: <span id="seat-count-display">0</span></p>
  <p>Total Price: ₹<span id="total-price">0</span></p>

  <button onclick="goToSuccess()">Proceed to Payment</button>
</div>

<script src="bookings.js"></script>

</body>
</html>
